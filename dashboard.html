<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Plataforma Educativa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-layout">
  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div class="topbar-title">
        <h2>Dashboard</h2>
        <p id="fechaHoy"></p>
      </div>
    </div>
    <div class="page-content" id="pageContent"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script>
const session = renderLayout('dashboard');

document.getElementById('fechaHoy').textContent = new Date().toLocaleDateString('es-CO', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

function render() {
  const db = getDB();
  const hoy = new Date().toISOString().split('T')[0];
  const novedadesHoy = db.novedades.filter(n => n.fecha === hoy).length;
  const ausenciasPendientes = db.ausencias.filter(a => a.estado === 'pendiente').length;
  const ausenciasTotal = db.ausencias.length;

  // Ausencias por mes (últimos 6 meses)
  const meses = {};
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const key = d.toLocaleDateString('es-CO', { month: 'short', year: '2-digit' });
    meses[key] = 0;
  }
  db.ausencias.forEach(a => {
    if (!a.fecha) return;
    const d = new Date(a.fecha);
    const key = d.toLocaleDateString('es-CO', { month: 'short', year: '2-digit' });
    if (meses[key] !== undefined) meses[key]++;
  });
  const maxBar = Math.max(...Object.values(meses), 1);

  // Profesores con más novedades
  const profCount = {};
  db.ausencias.forEach(a => {
    profCount[a.profesor] = (profCount[a.profesor] || 0) + 1;
  });
  const topProfs = Object.entries(profCount).sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxProf = topProfs.length ? topProfs[0][1] : 1;

  // Grupos más afectados
  const grupoCount = {};
  db.novedades.forEach(n => {
    if (n.gruposAfectados) n.gruposAfectados.forEach(g => {
      grupoCount[g] = (grupoCount[g] || 0) + 1;
    });
  });
  const topGrupos = Object.entries(grupoCount).sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxGrupo = topGrupos.length ? topGrupos[0][1] : 1;

  const barsMeses = Object.entries(meses).map(([k,v]) => `
    <div class="chart-bar-row">
      <div class="chart-bar-label">${k}</div>
      <div class="chart-bar-track">
        <div class="chart-bar-fill" style="width:${(v/maxBar)*100}%;background:var(--azul)"></div>
      </div>
      <div class="chart-bar-val">${v}</div>
    </div>`).join('');

  const barsProfs = topProfs.length ? topProfs.map(([p,v]) => `
    <div class="chart-bar-row">
      <div class="chart-bar-label" title="${p}">${p}</div>
      <div class="chart-bar-track">
        <div class="chart-bar-fill" style="width:${(v/maxProf)*100}%;background:var(--verde)"></div>
      </div>
      <div class="chart-bar-val">${v}</div>
    </div>`).join('') : '<div class="empty-state" style="padding:30px"><div class="icon">📊</div><p>Sin datos aún</p></div>';

  const barsGrupos = topGrupos.length ? topGrupos.map(([g,v]) => `
    <div class="chart-bar-row">
      <div class="chart-bar-label">Grupo ${g}</div>
      <div class="chart-bar-track">
        <div class="chart-bar-fill" style="width:${(v/maxGrupo)*100}%;background:var(--rojo)"></div>
      </div>
      <div class="chart-bar-val">${v}</div>
    </div>`).join('') : '<div class="empty-state" style="padding:30px"><div class="icon">📊</div><p>Sin datos aún</p></div>';

  // Últimas novedades
  const ultimasNovedades = [...db.novedades].reverse().slice(0,4);
  const novedadesHTML = ultimasNovedades.length ? ultimasNovedades.map(n => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gris-medio)">
      <span style="font-size:20px">📋</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700">${n.profesor || 'Sistema'}</div>
        <div style="font-size:12px;color:var(--gris-texto)">${n.descripcion || 'Novedad del día'}</div>
      </div>
      <span style="font-size:12px;color:var(--gris-texto)">${formatFecha(n.fecha)}</span>
    </div>`).join('') : '<div class="empty-state" style="padding:30px"><div class="icon">✨</div><p>Sin novedades recientes</p></div>';

  document.getElementById('pageContent').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon blue">🏫</div>
        <div class="stat-info"><div class="value">${GRUPOS.length}</div><div class="label">Grupos activos</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">👩‍🏫</div>
        <div class="stat-info"><div class="value">${PROFESORES.length}</div><div class="label">Docentes</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">⚠️</div>
        <div class="stat-info"><div class="value">${ausenciasPendientes}</div><div class="label">Ausencias pendientes</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow">📋</div>
        <div class="stat-info"><div class="value">${novedadesHoy}</div><div class="label">Novedades hoy</div></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:4px">📈 Ausencias por mes</h3>
        <p style="font-size:12px;color:var(--gris-texto);margin-bottom:16px">Últimos 6 meses</p>
        <div class="chart-bar-wrap">${barsMeses}</div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:4px">👨‍🏫 Docentes con más ausencias</h3>
        <p style="font-size:12px;color:var(--gris-texto);margin-bottom:16px">Top docentes</p>
        <div class="chart-bar-wrap">${barsProfs}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:4px">🏫 Grupos más afectados</h3>
        <p style="font-size:12px;color:var(--gris-texto);margin-bottom:16px">Por novedades</p>
        <div class="chart-bar-wrap">${barsGrupos}</div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:4px">🔔 Novedades recientes</h3>
        <p style="font-size:12px;color:var(--gris-texto);margin-bottom:4px">Últimos registros</p>
        ${novedadesHTML}
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
