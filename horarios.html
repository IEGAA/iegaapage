<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horarios — Plataforma Educativa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-layout">
  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div class="topbar-title">
        <h2>Horarios</h2>
        <p>Visualización por día y grupos</p>
      </div>
    </div>
    <div class="page-content" id="pageContent"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script>
const session = renderLayout('horarios');
const canEditBase = session.rol === 'administrador';
let tabActivo = 'novedades';
let diaActivo = DIAS[0];
let grupoFiltro = '';
let horarioActual = null;
let editorState = { dia: DIAS[0], hora: HORAS[0], grupo: GRUPOS[0] };

document.body.insertAdjacentHTML('beforeend', `
  <div class="modal-overlay" id="modalHorarioBase">
    <div class="modal" style="max-width:720px">
      <div class="modal-header">
        <h3>Editar horario base</h3>
        <button class="modal-close" onclick="cerrarModalHorarioBase()">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group-app">
          <label>Día</label>
          <select id="edDia"></select>
        </div>
        <div class="form-group-app">
          <label>Hora</label>
          <select id="edHora"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group-app">
          <label>Grupo</label>
          <select id="edGrupo"></select>
        </div>
        <div class="form-group-app">
          <label>Aula</label>
          <input type="text" id="edAula" placeholder="Ej: A-204">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group-app">
          <label>Profesor</label>
          <select id="edProfesor" onchange="setLibreEditorState()"></select>
        </div>
        <div class="form-group-app">
          <label>Materia</label>
          <select id="edMateria"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="cerrarModalHorarioBase()">Cancelar</button>
        <button class="btn btn-azul" onclick="guardarHorarioBase()">Guardar cambios</button>
      </div>
    </div>
  </div>
`);

function initEditorSelects() {
  setOptions('edDia', DIAS);
  setOptions('edHora', HORARIO_BLOQUES);
  setOptions('edGrupo', GRUPOS);
  setOptions('edProfesor', [LIBRE, ...PROFESORES]);
  setOptions('edMateria', [LIBRE, ...MATERIAS]);
}

function setOptions(id, values) {
  const select = document.getElementById(id);
  if (!select) return;
  select.innerHTML = values.map(value => {
    if (typeof value === 'object') {
      return `<option value="${value.hora}">${value.etiqueta}</option>`;
    }
    return `<option value="${value}">${value}</option>`;
  }).join('');
}

function setLibreEditorState() {
  const esLibre = document.getElementById('edProfesor').value === LIBRE;
  const materiaSelect = document.getElementById('edMateria');
  materiaSelect.disabled = esLibre;
  if (esLibre) {
    materiaSelect.value = LIBRE;
  }
}

function syncEditorState() {
  document.getElementById('edDia').value = editorState.dia;
  document.getElementById('edHora').value = editorState.hora;
  document.getElementById('edGrupo').value = editorState.grupo;
  const slot = horarioActual?.[editorState.dia]?.[editorState.hora]?.[editorState.grupo] || {};
  document.getElementById('edProfesor').value = slot.profesor || LIBRE;
  document.getElementById('edMateria').value = slot.materia || LIBRE;
  document.getElementById('edAula').value = slot.aula || '';
  setLibreEditorState();
}

function openHorarioEditor(dia = editorState.dia, hora = editorState.hora, grupo = editorState.grupo) {
  if (!canEditBase) return;
  editorState = { dia, hora, grupo };
  initEditorSelects();
  syncEditorState();
  document.getElementById('modalHorarioBase').classList.add('open');
}

function cerrarModalHorarioBase() {
  document.getElementById('modalHorarioBase').classList.remove('open');
}

function guardarHorarioBase() {
  const dia = document.getElementById('edDia').value;
  const hora = document.getElementById('edHora').value;
  const grupo = document.getElementById('edGrupo').value;
  const profesor = document.getElementById('edProfesor').value;
  const materia = document.getElementById('edMateria').value;
  const aula = document.getElementById('edAula').value.trim();
  const esLibre = profesor === LIBRE || materia === LIBRE;

  if (!dia || !hora || !grupo || !profesor || (!esLibre && !materia)) {
    showToast('Completa los campos obligatorios.', 'error');
    return;
  }

  apiJson('/api/horarios/base', {
    method: 'PUT',
    body: JSON.stringify({
      dia,
      hora,
      grupo,
      profesor,
      materia: esLibre ? LIBRE : materia,
      aula: esLibre ? '' : aula
    })
  })
    .then(() => {
      showToast('Horario base actualizado.', 'success');
      cerrarModalHorarioBase();
      return render();
    })
    .catch(error => showToast(error.message, 'error'));
}

async function render() {
  const horario = (await fetchHorarios(tabActivo === 'base' ? 'base' : 'novedades')).horario;
  horarioActual = horario;

  const tabs = `
    <div class="tabs">
      <button class="tab-btn ${tabActivo==='novedades'?'active':''}" onclick="setTab('novedades')">📋 Horario del día</button>
      <button class="tab-btn ${tabActivo==='base'?'active':''}" onclick="setTab('base')">📌 Horario base</button>
      ${session.rol==='administrador' ? `<button class="tab-btn ${tabActivo==='profesores'?'active':''}" onclick="setTab('profesores')">👨‍🏫 Por docente</button>` : ''}
    </div>`;

  const diasChips = DIAS.map(d => `
    <button class="chip ${d===diaActivo?'active':''}" onclick="setDia('${d}')">${d}</button>
  `).join('');

  let content = '';

  const baseActions = tabActivo === 'base' && canEditBase ? `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="font-size:13px;color:var(--gris-texto)">Haz clic en una celda para editar profesor, materia y aula.</div>
      <button class="btn btn-azul" onclick="openHorarioEditor()">✚ Editar horario base</button>
    </div>` : '';

  if (tabActivo === 'profesores') {
    content = renderPorProfesor();
  } else {
    // Grupos mostrados (máx 12 para que cargue bien)
    const gruposMostrar = grupoFiltro ? [grupoFiltro] : GRUPOS.slice(0,10);
    
    const grupoSelect = `
      <select onchange="setGrupo(this.value)" style="padding:8px 14px;border:2px solid var(--gris-medio);border-radius:var(--radio-sm);font-size:13px;font-family:var(--font);outline:none;cursor:pointer">
        <option value="">Todos los grupos (10 primeros)</option>
        ${GRUPOS.map(g => `<option value="${g}" ${g===grupoFiltro?'selected':''}>${g}</option>`).join('')}
      </select>`;

    const leyenda = `
      <div class="leyenda">
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#bfdbfe"></div> Normal</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#bbf7d0"></div> 🟢 Entrada tardía</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#bfdbfe"></div> 🔵 Salida temprana</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#fecaca"></div> 🔴 Clase afectada</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#e2e8f0"></div> LIBRE</div>
      </div>`;

    const diaData = horario[diaActivo] || {};

    const thead = `<tr>
      <th>Hora</th>
      ${gruposMostrar.map(g => `<th>${g}</th>`).join('')}
    </tr>`;

    const rows = HORAS.map(hora => {
      const cells = gruposMostrar.map(grupo => {
        const clase = (diaData[hora] || {})[grupo];
        if (!clase) return '<td>—</td>';
        const aula = clase.aula ? `<div class="aula">Aula ${clase.aula}</div>` : '';
        let cssClass = 'celda-normal';
        if (clase.afectada) cssClass = 'celda-afectada';
        else if (clase.entradaTarde) cssClass = 'celda-entrada-tarde';
        else if (clase.salidaTemprana) cssClass = 'celda-salida-temprana';
        const editable = tabActivo === 'base' && canEditBase ? 'editable-cell' : '';
        const clickAction = tabActivo === 'base' && canEditBase ? `onclick="openHorarioEditor('${diaActivo}','${hora}','${grupo}')"` : '';
        return `<td ${clickAction} class="${editable}"><div class="celda-clase ${cssClass}"><div class="prof">${clase.profesor}</div><div class="mat">${clase.materia}</div>${aula}</div></td>`;
      }).join('');
      return `<tr><td style="font-weight:700;white-space:nowrap;color:var(--azul)">${getHorarioLabel(hora)}</td>${cells}</tr>`;
    }).join('');

    content = `
      ${baseActions}
      <div class="selector-bar">
        ${diasChips}
        ${grupoSelect}
      </div>
      ${leyenda}
      <div class="card" style="padding:0">
        <div class="horario-wrap">
          <table class="horario-table">
            <thead>${thead}</thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  document.getElementById('pageContent').innerHTML = tabs + content;
}

function renderPorProfesor() {
  const profSelect = `
    <div style="margin-bottom:20px">
      <select id="profSel" onchange="renderProfesorHorario()" style="padding:10px 16px;border:2px solid var(--gris-medio);border-radius:var(--radio-sm);font-size:14px;font-family:var(--font);outline:none;min-width:250px">
        <option value="">Seleccionar docente...</option>
        ${PROFESORES.map(p => `<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <div id="profHorarioWrap"></div>`;
  return profSelect;
}

function renderProfesorHorario() {
  const prof = document.getElementById('profSel').value;
  if (!prof) return;

  const rows = [];
  DIAS.forEach(dia => {
    HORAS.forEach(hora => {
      GRUPOS.forEach(grupo => {
        const c = (horarioActual[dia] && horarioActual[dia][hora] && horarioActual[dia][hora][grupo]);
        if (c && c.profesor === prof) {
          rows.push({ dia, hora, grupo, materia: c.materia, aula: c.aula || '', afectada: c.afectada });
        }
      });
    });
  });

  const wrap = document.getElementById('profHorarioWrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">📅</div><h3>Sin clases asignadas</h3></div>';
    return;
  }

  const byDia = {};
  DIAS.forEach(d => byDia[d] = rows.filter(r => r.dia === d));

  wrap.innerHTML = DIAS.map(dia => {
    const clases = byDia[dia];
    if (!clases.length) return '';
    return `
      <div style="margin-bottom:16px">
        <h4 style="font-size:14px;font-weight:700;color:var(--azul);margin-bottom:8px">${dia}</h4>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${clases.map(c => `
            <div style="background:${c.afectada?'var(--rojo-claro)':'var(--azul-claro)'};border-radius:8px;padding:8px 14px">
              <div style="font-weight:700;font-size:13px">${getHorarioLabel(c.hora)}</div>
              <div style="font-size:12px;color:var(--gris-texto)">Grupo ${c.grupo} — ${c.materia}${c.aula ? ` · Aula ${c.aula}` : ''}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function setTab(t) { tabActivo = t; render(); }
function setDia(d) { diaActivo = d; render(); }
function setGrupo(g) { grupoFiltro = g; render(); }

function getEstadoCelda(clase) {
  if (!clase || clase.profesor === LIBRE || clase.materia === LIBRE) return 'libre';
  if (clase.afectada) return 'afectada';
  if (clase.entradaTarde) return 'entradaTarde';
  if (clase.salidaTemprana) return 'salidaTemprana';
  return 'normal';
}

initEditorSelects();
render().catch(error => showToast(error.message, 'error'));
</script>
</body>
</html>
