<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novedades — Plataforma Educativa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><h2>Novedades y Ausencias</h2><p>Gestión de ausencias y cambios de horario</p></div>
      <div class="topbar-actions">
        <button class="btn btn-verde" onclick="abrirModalSolicitud()">✚ Solicitar ausencia</button>
      </div>
    </div>
    <div class="page-content" id="pageContent"></div>
  </div>
</div>

<!-- Modal Solicitar Ausencia -->
<div class="modal-overlay" id="modalSolicitud">
  <div class="modal">
    <div class="modal-header">
      <h3>🔄 Solicitar Ausencia</h3>
      <button class="modal-close" onclick="cerrarModal('modalSolicitud')">✕</button>
    </div>
    <div class="form-group-app">
      <label>Docente</label>
      <select id="solProfesor">
        <option value="">Seleccionar docente...</option>
      </select>
    </div>
    <div class="form-group-app">
      <label>Fecha de ausencia</label>
      <input type="date" id="solFecha">
    </div>
    <div class="form-group-app">
      <label>Motivo</label>
      <textarea id="solMotivo" placeholder="Describe el motivo de la ausencia..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalSolicitud')">Cancelar</button>
      <button class="btn btn-verde" onclick="enviarSolicitud()">Enviar solicitud</button>
    </div>
  </div>
</div>

<!-- Modal Detalle Ausencia -->
<div class="modal-overlay" id="modalDetalle">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h3 id="detalleTitle">Detalle de ausencia</h3>
      <button class="modal-close" onclick="cerrarModal('modalDetalle')">✕</button>
    </div>
    <div id="detalleContent"></div>
    <div class="modal-footer" id="detalleFooter"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script>
const session = renderLayout('novedades');

// Poblar select de profesores
function initSelects() {
  const sel = document.getElementById('solProfesor');
  if (session.rol === 'profesor') {
    sel.innerHTML = `<option value="${session.nombre}" selected>${session.nombre}</option>`;
    sel.disabled = true;
  } else {
    PROFESORES.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });
  }
  // Fecha mínima: hoy
  const fd = document.getElementById('solFecha');
  fd.min = new Date().toISOString().split('T')[0];
  fd.value = new Date().toISOString().split('T')[0];
}

function render() {
  const db = getDB();
  let ausencias = [...db.ausencias].reverse();
  
  // Filtros según rol
  if (session.rol === 'profesor') {
    ausencias = ausencias.filter(a => a.profesor === session.nombre);
  }

  const stats = `
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-icon yellow">⏳</div>
        <div class="stat-info"><div class="value">${ausencias.filter(a=>a.estado==='pendiente').length}</div><div class="label">Pendientes</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div class="stat-info"><div class="value">${ausencias.filter(a=>a.estado==='aprobada').length}</div><div class="label">Aprobadas</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">❌</div>
        <div class="stat-info"><div class="value">${ausencias.filter(a=>a.estado==='rechazada').length}</div><div class="label">Rechazadas</div></div>
      </div>
    </div>`;

  const lista = ausencias.length ? ausencias.map(a => {
    const puedeGestionar = (session.rol === 'administrador' || session.rol === 'coordinador') && a.estado === 'pendiente';
    return `
      <div class="novedad-card">
        <div style="font-size:28px">${a.estado==='aprobada'?'✅':a.estado==='rechazada'?'❌':'⏳'}</div>
        <div class="novedad-info">
          <h4>${a.profesor}</h4>
          <p>${a.motivo || 'Sin motivo especificado'}</p>
          <div class="meta">📅 ${formatFecha(a.fecha)} · Solicitada ${formatFecha(a.creada)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <span class="novedad-badge ${a.estado==='pendiente'?'badge-pendiente':a.estado==='aprobada'?'badge-aprobada':'badge-rechazada'}">
            ${a.estado.charAt(0).toUpperCase()+a.estado.slice(1)}
          </span>
          ${a.estado==='aprobada' ? `<button class="btn btn-sm btn-azul" onclick="verDetalle('${a.id}')">Ver cambios</button>` : ''}
          ${puedeGestionar ? `
            <div class="novedad-actions">
              <button class="btn btn-sm btn-verde" onclick="aprobarAusencia('${a.id}')">Aprobar</button>
              <button class="btn btn-sm btn-rojo" onclick="rechazarAusencia('${a.id}')">Rechazar</button>
            </div>` : ''}
        </div>
      </div>`;
  }).join('') : `<div class="empty-state"><div class="icon">🔄</div><h3>Sin ausencias registradas</h3><p>Las solicitudes de ausencia aparecerán aquí.</p></div>`;

  document.getElementById('pageContent').innerHTML = stats + `
    <div class="card" style="padding:0 24px 24px">
      <div style="padding:20px 0 16px;border-bottom:1px solid var(--gris-medio);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <h3 style="font-size:15px;font-weight:700">Solicitudes de ausencia</h3>
        <span style="font-size:13px;color:var(--gris-texto)">${ausencias.length} registros</span>
      </div>
      ${lista}
    </div>`;
}

function abrirModalSolicitud() {
  document.getElementById('modalSolicitud').classList.add('open');
}

function cerrarModal(id) {
  document.getElementById(id).classList.remove('open');
}

function enviarSolicitud() {
  const profesor = document.getElementById('solProfesor').value;
  const fecha = document.getElementById('solFecha').value;
  const motivo = document.getElementById('solMotivo').value.trim();

  if (!profesor || !fecha) { showToast('Completa todos los campos.', 'error'); return; }

  const db = getDB();
  const nuevaAusencia = {
    id: 'aus_' + Date.now(),
    profesor, fecha, motivo,
    estado: 'pendiente',
    creada: new Date().toISOString().split('T')[0],
    solicitadoPor: session.nombre
  };
  db.ausencias.push(nuevaAusencia);
  saveDB(db);
  cerrarModal('modalSolicitud');
  document.getElementById('solMotivo').value = '';
  showToast('Solicitud enviada correctamente.', 'success');
  render();
}

function aprobarAusencia(id) {
  const db = getDB();
  const aus = db.ausencias.find(a => a.id === id);
  if (!aus) return;

  aus.estado = 'aprobada';
  aus.aprobadaPor = session.nombre;
  aus.aprobadaEn = new Date().toISOString();

  // ALGORITMO: procesar novedad
  const resultado = procesarNovedad(db, aus);
  aus.resultado = resultado;

  // Generar información automática
  generarInformacion(db, aus, resultado);

  saveDB(db);
  showToast('Ausencia aprobada y horario actualizado.', 'success');
  render();
}

function rechazarAusencia(id) {
  const db = getDB();
  const aus = db.ausencias.find(a => a.id === id);
  if (!aus) return;
  aus.estado = 'rechazada';
  saveDB(db);
  showToast('Solicitud rechazada.', 'info');
  render();
}

// ===================== ALGORITMO DE NOVEDADES =====================
function procesarNovedad(db, ausencia) {
  const { profesor, fecha } = ausencia;
  
  // Determinar día de la semana
  const d = new Date(fecha + 'T12:00:00');
  const diaIdx = d.getDay(); // 0=Dom, 1=Lun...5=Vie
  if (diaIdx === 0 || diaIdx === 6) return { clases: [], mensaje: 'No es día hábil' };
  const dia = DIAS[diaIdx - 1];

  const horario = db.horarioNovedades;
  const diaData = horario[dia] || {};

  // Paso 1: Detectar clases del docente ese día
  const clasesProfesor = [];
  HORAS.forEach(hora => {
    GRUPOS.forEach(grupo => {
      const c = diaData[hora] && diaData[hora][grupo];
      if (c && c.profesor === profesor) {
        clasesProfesor.push({ hora, grupo, materia: c.materia });
      }
    });
  });

  if (!clasesProfesor.length) return { clases: [], mensaje: 'Sin clases ese día' };

  // Paso 2 & 3: Buscar sustitutos disponibles
  const resultado = clasesProfesor.map(clase => {
    const horaIdx = HORAS.indexOf(clase.hora);
    
    // Buscar quién está libre en esa hora
    const ocupados = new Set();
    GRUPOS.forEach(g => {
      const c = diaData[clase.hora] && diaData[clase.hora][g];
      if (c) ocupados.add(c.profesor);
    });

    // Profesores disponibles (no están dando clase a esa hora)
    const disponibles = PROFESORES.filter(p => p !== profesor && !ocupados.has(p));
    const sustituto = disponibles[0] || null;

    // Marcar en horario de novedades
    if (horario[dia] && horario[dia][clase.hora] && horario[dia][clase.hora][clase.grupo]) {
      if (sustituto) {
        horario[dia][clase.hora][clase.grupo] = {
          ...horario[dia][clase.hora][clase.grupo],
          profesor: sustituto,
          afectada: false,
          entradaTarde: false,
          salidaTemprana: false,
          sustituye: profesor
        };
      } else {
        horario[dia][clase.hora][clase.grupo].afectada = true;
      }
    }

    return { ...clase, sustituto, dia };
  });

  // Paso 4: Optimizar (marcar entrada tardía / salida temprana por grupo)
  const gruposAfectados = [...new Set(resultado.map(r => r.grupo))];
  
  gruposAfectados.forEach(grupo => {
    const clasesGrupo = HORAS.map(h => ({
      hora: h,
      idx: HORAS.indexOf(h),
      clase: diaData[h] && diaData[h][grupo]
    })).filter(x => x.clase);

    const clasesDocente = clasesProfesor.filter(c => c.grupo === grupo).map(c => HORAS.indexOf(c.hora));

    if (!clasesDocente.length) return;
    const primeraClase = Math.min(...clasesGrupo.map(c => c.idx));
    const ultimaClase = Math.max(...clasesGrupo.map(c => c.idx));
    const primerAusente = Math.min(...clasesDocente);
    const ultimoAusente = Math.max(...clasesDocente);

    // Si el ausente tiene la primera hora del grupo → entrada tardía
    if (primerAusente === primeraClase && horario[dia] && horario[dia][HORAS[primeraClase]] && horario[dia][HORAS[primeraClase]][grupo]) {
      horario[dia][HORAS[primeraClase]][grupo].entradaTarde = true;
    }
    // Si el ausente tiene la última hora del grupo → salida temprana
    if (ultimoAusente === ultimaClase && horario[dia] && horario[dia][HORAS[ultimaClase]] && horario[dia][HORAS[ultimaClase]][grupo]) {
      horario[dia][HORAS[ultimaClase]][grupo].salidaTemprana = true;
    }
  });

  return { clases: resultado, dia, gruposAfectados };
}

function generarInformacion(db, ausencia, resultado) {
  if (!resultado || !resultado.clases || !resultado.clases.length) return;

  // Por cada grupo afectado, generar mensaje informativo
  const gruposAfectados = resultado.gruposAfectados || [];
  const dia = resultado.dia;
  const d = new Date(ausencia.fecha + 'T12:00:00');

  gruposAfectados.forEach(grupo => {
    const clasesGrupo = resultado.clases.filter(c => c.grupo === grupo);
    const primerHora = clasesGrupo[0]?.hora;
    const ultimaHora = clasesGrupo[clasesGrupo.length-1]?.hora;

    let msg = `Grupo ${grupo} el ${d.toLocaleDateString('es-CO', {weekday:'long', day:'numeric', month:'long'})}: `;
    
    // Detectar tipo de novedad
    const diaData = db.horarioNovedades[dia] || {};
    const primeraClase = HORAS.find(h => diaData[h] && diaData[h][grupo]);
    const ultimaClase = [...HORAS].reverse().find(h => diaData[h] && diaData[h][grupo]);

    if (primerHora === primeraClase) {
      msg += `entra a las ${HORAS[HORAS.indexOf(primerHora)+clasesGrupo.length] || '7:00'} am (entrada tardía)`;
    } else if (ultimaHora === ultimaClase) {
      msg += `sale a las ${primerHora} (salida temprana)`;
    } else {
      msg += `hora libre a las ${primerHora}`;
    }

    db.informacion.push({
      id: 'info_' + Date.now() + Math.random(),
      fecha: ausencia.fecha,
      grupo,
      mensaje: msg,
      tipo: 'novedad',
      creada: new Date().toISOString(),
      ausenciaId: ausencia.id,
      profesor: ausencia.profesor
    });
  });

  // También registrar en novedades
  db.novedades.push({
    id: 'nov_' + Date.now(),
    fecha: ausencia.fecha,
    profesor: ausencia.profesor,
    descripcion: `Ausencia procesada. ${gruposAfectados.length} grupos afectados.`,
    gruposAfectados,
    tipo: 'ausencia'
  });
}

function verDetalle(id) {
  const db = getDB();
  const aus = db.ausencias.find(a => a.id === id);
  if (!aus || !aus.resultado) return;

  const r = aus.resultado;
  const clases = r.clases || [];

  const rows = clases.map(c => `
    <tr>
      <td style="font-weight:600">${c.hora}</td>
      <td>Grupo ${c.grupo}</td>
      <td>${c.materia}</td>
      <td>${c.sustituto ? `<span style="color:var(--verde);font-weight:600">✅ ${c.sustituto}</span>` : '<span style="color:var(--rojo)">⚠️ Sin sustituto</span>'}</td>
    </tr>`).join('');

  document.getElementById('detalleTitle').textContent = `Ausencia de ${aus.profesor}`;
  document.getElementById('detalleContent').innerHTML = `
    <div style="background:var(--gris-claro);border-radius:8px;padding:14px;margin-bottom:16px">
      <strong>📅 Fecha:</strong> ${formatFecha(aus.fecha)} · <strong>Día:</strong> ${r.dia || '-'}
    </div>
    ${clases.length ? `
    <table class="data-table">
      <thead><tr><th>Hora</th><th>Grupo</th><th>Materia</th><th>Sustituto</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` : '<div class="empty-state"><div class="icon">📋</div><p>Sin clases ese día</p></div>'}
  `;
  document.getElementById('detalleFooter').innerHTML = `<button class="btn btn-ghost" onclick="cerrarModal('modalDetalle')">Cerrar</button>`;
  document.getElementById('modalDetalle').classList.add('open');
}

initSelects();
render();
</script>
</body>
</html>
