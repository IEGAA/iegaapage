<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novedades — IEGAA</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><h2>Novedades y Ausencias</h2><p>Gestión de ausencias y cambios de horario</p></div>
      <div class="topbar-actions">
        <button class="btn btn-verde" onclick="abrirModalSolicitud()">✚ Solicitar ausencia</button>
      </div>
    </div>
    <div class="page-content" id="pageContent"></div>
  </div>
</div>

<!-- Modal Solicitar Ausencia -->
<div class="modal-overlay" id="modalSolicitud">
  <div class="modal">
    <div class="modal-header">
      <h3>🔄 Solicitar Ausencia</h3>
      <button class="modal-close" onclick="cerrarModal('modalSolicitud')">✕</button>
    </div>
    <div class="form-group-app">
      <label>Docente</label>
      <select id="solProfesor">
        <option value="">Seleccionar docente...</option>
      </select>
    </div>
    <div class="form-group-app">
      <label>Fecha de ausencia</label>
      <input type="date" id="solFecha">
    </div>
    <div class="form-group-app">
      <label>Motivo</label>
      <textarea id="solMotivo" placeholder="Describe el motivo de la ausencia..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalSolicitud')">Cancelar</button>
      <button class="btn btn-verde" onclick="enviarSolicitud()">Enviar solicitud</button>
    </div>
  </div>
</div>

<!-- Modal Detalle Ausencia -->
<div class="modal-overlay" id="modalDetalle">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h3 id="detalleTitle">Detalle de ausencia</h3>
      <button class="modal-close" onclick="cerrarModal('modalDetalle')">✕</button>
    </div>
    <div id="detalleContent"></div>
    <div class="modal-footer" id="detalleFooter"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script>
const session = renderLayout('novedades');

// Poblar select de profesores
function initSelects() {
  const sel = document.getElementById('solProfesor');
  if (session.rol === 'profesor') {
    sel.innerHTML = `<option value="${session.nombre}" selected>${session.nombre}</option>`;
    sel.disabled = true;
  } else {
    PROFESORES.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });
  }
  // Fecha mínima: hoy
  const fd = document.getElementById('solFecha');
  fd.min = new Date().toISOString().split('T')[0];
  fd.value = new Date().toISOString().split('T')[0];
}

async function render() {
  let ausencias = (await fetchAusencias()).ausencias.reverse();
  window.__ausenciasCache = ausencias;
  
  // Filtros según rol
  if (session.rol === 'profesor') {
    ausencias = ausencias.filter(a => a.profesor === session.nombre);
    window.__ausenciasCache = ausencias;
  }

  const stats = `
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-icon yellow">⏳</div>
        <div class="stat-info"><div class="value">${ausencias.filter(a=>a.estado==='pendiente').length}</div><div class="label">Pendientes</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div class="stat-info"><div class="value">${ausencias.filter(a=>a.estado==='aprobada').length}</div><div class="label">Aprobadas</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">❌</div>
        <div class="stat-info"><div class="value">${ausencias.filter(a=>a.estado==='rechazada').length}</div><div class="label">Rechazadas</div></div>
      </div>
    </div>`;

  const lista = ausencias.length ? ausencias.map(a => {
    const puedeGestionar = (session.rol === 'administrador' || session.rol === 'coordinador') && a.estado === 'pendiente';
    return `
      <div class="novedad-card">
        <div style="font-size:28px">${a.estado==='aprobada'?'✅':a.estado==='rechazada'?'❌':'⏳'}</div>
        <div class="novedad-info">
          <h4>${a.profesor}</h4>
          <p>${a.motivo || 'Sin motivo especificado'}</p>
          <div class="meta">📅 ${formatFecha(a.fecha)} · Solicitada ${formatFecha(a.creada)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <span class="novedad-badge ${a.estado==='pendiente'?'badge-pendiente':a.estado==='aprobada'?'badge-aprobada':'badge-rechazada'}">
            ${a.estado.charAt(0).toUpperCase()+a.estado.slice(1)}
          </span>
          ${a.estado==='aprobada' ? `<button class="btn btn-sm btn-azul" onclick="verDetalle('${a.id}')">Ver cambios</button>` : ''}
          ${puedeGestionar ? `
            <div class="novedad-actions">
              <button class="btn btn-sm btn-verde" onclick="aprobarAusencia('${a.id}')">Aprobar</button>
              <button class="btn btn-sm btn-rojo" onclick="rechazarAusencia('${a.id}')">Rechazar</button>
            </div>` : ''}
        </div>
      </div>`;
  }).join('') : `<div class="empty-state"><div class="icon">🔄</div><h3>Sin ausencias registradas</h3><p>Las solicitudes de ausencia aparecerán aquí.</p></div>`;

  document.getElementById('pageContent').innerHTML = stats + `
    <div class="card" style="padding:0 24px 24px">
      <div style="padding:20px 0 16px;border-bottom:1px solid var(--gris-medio);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <h3 style="font-size:15px;font-weight:700">Solicitudes de ausencia</h3>
        <span style="font-size:13px;color:var(--gris-texto)">${ausencias.length} registros</span>
      </div>
      ${lista}
    </div>`;
}

function abrirModalSolicitud() {
  document.getElementById('modalSolicitud').classList.add('open');
}

function cerrarModal(id) {
  document.getElementById(id).classList.remove('open');
}

function enviarSolicitud() {
  const profesor = document.getElementById('solProfesor').value;
  const fecha = document.getElementById('solFecha').value;
  const motivo = document.getElementById('solMotivo').value.trim();

  if (!profesor || !fecha) { showToast('Completa todos los campos.', 'error'); return; }

  createAbsence({ profesor, fecha, motivo, solicitadoPor: session.nombre })
    .then(() => {
      cerrarModal('modalSolicitud');
      document.getElementById('solMotivo').value = '';
      showToast('Solicitud enviada correctamente.', 'success');
      return render();
    })
    .catch(error => showToast(error.message, 'error'));
}

function aprobarAusencia(id) {
  approveAbsence(id)
    .then(() => {
      showToast('Ausencia aprobada y horario actualizado.', 'success');
      return render();
    })
    .catch(error => showToast(error.message, 'error'));
}

function rechazarAusencia(id) {
  rejectAbsence(id)
    .then(() => {
      showToast('Solicitud rechazada.', 'info');
      return render();
    })
    .catch(error => showToast(error.message, 'error'));
}

function verDetalle(id) {
  const aus = (window.__ausenciasCache || []).find(a => a.id === id);
  if (!aus || !aus.resultado) return;

  const r = aus.resultado;
  const clases = r.clases || [];

  const rows = clases.map(c => `
    <tr>
      <td style="font-weight:600">${c.hora}</td>
      <td>Grupo ${c.grupo}</td>
      <td>${c.materia}</td>
      <td>${c.ajuste === 'entradaTarde' ? '<span style="color:var(--verde);font-weight:600">🟢 Entrada tardía</span>' : c.ajuste === 'salidaTemprana' ? '<span style="color:var(--azul);font-weight:600">🔵 Salida temprana</span>' : '<span style="color:var(--rojo)">🔴 Clase afectada</span>'}</td>
    </tr>`).join('');

  document.getElementById('detalleTitle').textContent = `Ausencia de ${aus.profesor}`;
  document.getElementById('detalleContent').innerHTML = `
    <div style="background:var(--gris-claro);border-radius:8px;padding:14px;margin-bottom:16px">
      <strong>📅 Fecha:</strong> ${formatFecha(aus.fecha)} · <strong>Día:</strong> ${r.dia || '-'}
    </div>
    ${clases.length ? `
    <table class="data-table">
      <thead><tr><th>Hora</th><th>Grupo</th><th>Materia</th><th>Ajuste</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` : '<div class="empty-state"><div class="icon">📋</div><p>Sin clases ese día</p></div>'}
  `;
  document.getElementById('detalleFooter').innerHTML = `<button class="btn btn-ghost" onclick="cerrarModal('modalDetalle')">Cerrar</button>`;
  document.getElementById('modalDetalle').classList.add('open');
}

initSelects();
render().catch(error => showToast(error.message, 'error'));
</script>
</body>
</html>
