<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma Educativa — Iniciar sesión</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon-wrap">🎓</div>
      <h1>Plataforma Educativa</h1>
      <p>Sistema de Gestión de Horarios y Novedades</p>
    </div>

    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos.</div>

    <div class="form-group">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="login()">Ingresar al sistema</button>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  // Si ya hay sesión activa, redirigir
  if (getSession()) window.location.href = 'dashboard.html';

  document.getElementById('contrasena').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function login() {
    const usuario = document.getElementById('usuario').value.trim();
    const contrasena = document.getElementById('contrasena').value.trim();
    loginWithApi(usuario, contrasena)
      .then(() => { window.location.href = 'dashboard.html'; })
      .catch(() => {
        const err = document.getElementById('errorMsg');
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
      });
  }
</script>
</body>
</html>
